# Phase 14 — lint, tests, Terraform validate, Docker image build, optional eval smoke (OpenAI secret).
#
# Branching: routine work on **dev**; merge to **main** via PR only (protect `main` in GitHub).

name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync (dev tools)
        run: uv sync --frozen --extra dev
      - name: Ruff
        run: uv run ruff check app tests

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Format check
        run: terraform fmt -check -recursive infra/terraform
      - name: Init (no backend)
        working-directory: infra/terraform/envs/dev
        run: terraform init -backend=false -input=false -lockfile=readonly
      - name: Validate (dev)
        working-directory: infra/terraform/envs/dev
        run: terraform validate

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync
        run: uv sync --frozen --extra dev
      - name: Pytest (unit + integration)
        run: uv run pytest tests/unit tests/integration -q
        env:
          ENABLE_GRADIO_UI: "0"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000

  docker:
    needs: [test, terraform]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync (stub script imports app)
        run: uv sync --frozen --extra dev
      - name: Stub RAG index for Dockerfile COPY
        run: uv run python scripts/ci/stub_rag_index.py
      - name: Docker build
        run: docker build -f Dockerfile -t aira-api:ci .

  eval-smoke:
    needs: test
    if: github.event.repository.fork == false && secrets.OPENAI_API_KEY != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync
        run: uv sync --frozen --extra dev
      - name: Build RAG index
        run: uv run rag-build
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      - name: Eval subset (3 cases)
        run: uv run triage-eval --limit 3
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRIAGE_AUDIT_DISABLE: "1"
