# Phase 14 — lint, tests, Terraform validate, Docker image build, optional eval smoke (OpenAI secret).
#
# Branching: routine work on **dev**; merge to **main** via PR only (protect `main` in GitHub).

name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

# On main, do not cancel in-progress runs: merge + duplicate webhooks can start two
# runs for the same ref and cancel the first mid-job (red X on the default branch).
# On dev / PRs, cancel superseded runs so rapid pushes do not pile up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync (dev tools)
        run: uv sync --frozen --extra dev
      - name: Ruff
        run: uv run ruff check app tests scripts/ci

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.4"
          terraform_wrapper: false
      - name: Format check
        run: terraform fmt -check -recursive infra/terraform
      - name: Init (no backend)
        working-directory: infra/terraform/envs/dev
        run: |
          rm -rf .terraform
          terraform init -backend=false -input=false -lockfile=readonly
      - name: Validate (dev)
        working-directory: infra/terraform/envs/dev
        run: terraform validate

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync
        run: uv sync --frozen --extra dev
      - name: Pytest (unit + integration)
        run: uv run pytest tests/unit tests/integration -q
        env:
          ENABLE_GRADIO_UI: "0"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000

  docker:
    needs: [test, terraform]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync (stub script imports app)
        run: uv sync --frozen --extra dev
      - name: Stub RAG index for Dockerfile COPY
        run: uv run python scripts/ci/stub_rag_index.py
      - name: Docker build
        run: docker build -f Dockerfile -t aira-api:ci .

  # Job-level `if` cannot use `secrets.*` (GitHub rejects it). Optional OpenAI steps run in shell.
  eval-smoke:
    needs: test
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Sync
        run: uv sync --frozen --extra dev
      - name: RAG build + triage-eval (skipped if no OPENAI_API_KEY secret)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRIAGE_AUDIT_DISABLE: "1"
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "Skipping eval-smoke: add repository secret OPENAI_API_KEY to run live LLM checks."
            exit 0
          fi
          uv run rag-build
          uv run triage-eval --limit 3
