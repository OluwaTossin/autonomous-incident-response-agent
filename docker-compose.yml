# Phase 9 — full local stack: triage API (+ Gradio /ui) + n8n.
#
# Prerequisites:
#   1. Copy `.env.example` → `.env` and set OPENAI_API_KEY (and SLACK_WEBHOOK_URL if using Slack nodes).
#   2. On the host: `uv run rag-build` so `./.rag_index` exists (mounted read-only into the API).
# Persistence: `./data` (corpus paths, logs, eval artifacts) and `./.rag_index` (FAISS) are bind-mounted
# so image rebuilds do not wipe JSONL logs or the vector index.
#
# Usage (repo root):
#   docker compose up -d --build
#   open http://127.0.0.1:8000/docs  and  http://127.0.0.1:8000/ui
# If host port 8000 is busy (e.g. local `serve-api` or another container):
#   COMPOSE_API_PORT=18080 docker compose up -d --build
#   then http://127.0.0.1:18080/docs  (n8n still uses http://api:8000 inside the network)
#   open http://localhost:5678  → import workflows from workflows/n8n/
#
# n8n reaches the API via Docker DNS (`api:8000`). Do not set TRIAGE_API_BASE to host.docker.internal
# when using this file.

services:
  api:
    build: .
    ports:
      - "${COMPOSE_API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      ENABLE_GRADIO_UI: "${ENABLE_GRADIO_UI:-1}"
    volumes:
      # Pre-built FAISS index from host (`uv run rag-build`); survives container rebuilds.
      - ./.rag_index:/app/.rag_index:ro
      # Full data tree: runbooks/incidents/logs (read), JSONL audit + n8n logs + eval (write).
      - ./data:/app/data
    healthcheck:
      test:
        ["CMD", "curl", "--fail", "--silent", "--show-error", "--max-time", "4", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  n8n:
    image: n8nio/n8n:1.73.1
    ports:
      - "5678:5678"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TRIAGE_API_BASE=http://api:8000
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
