# Version 2 product stack: API + Next.js (static) by default; n8n is optional (`--profile automation`).
#
# Prerequisites:
#   1. Copy `.env.example` → `.env` and set OPENAI_API_KEY.
#   2. Build the RAG index on the host (workspace layout; demo corpus lives in ./sample_data):
#        uv run product-build-index --workspace default
#      Legacy: `uv run rag-build` still writes `workspaces/<id>/index/` when RAG_INDEX_DIR is unset,
#      or set RAG_INDEX_DIR in `.env` to a repo-relative path (e.g. legacy `.rag_index`).
#      The API image always contains a stub `.rag_index/` for `docker build`; Compose defaults mount
#      `./workspaces` so the live index is `workspaces/<WORKSPACE_ID>/index/` when RAG_INDEX_DIR is empty.
#
# Usage (repo root):
#   ./scripts/product/start.sh
#   # or: docker compose up -d --build
#   # optional n8n: docker compose --profile automation up -d --build
#
# URLs (defaults):
#   API (OpenAPI):     http://127.0.0.1:${COMPOSE_API_PORT:-18080}/docs
#   Gradio (optional): http://127.0.0.1:${COMPOSE_API_PORT:-18080}/ui
#   Next.js (static):  http://127.0.0.1:${COMPOSE_UI_PORT:-3000}/
#   n8n (profile):     http://127.0.0.1:5678/
#
# Inside the Docker network the API is `http://api:8000`. Browser traffic must use the published
# host URL — set NEXT_PUBLIC_API_BASE_URL at frontend image build time (see `frontend` service).

name: aira

services:
  api:
    build: .
    ports:
      - "${COMPOSE_API_PORT:-18080}:8000"
    env_file:
      - .env
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      ENABLE_GRADIO_UI: "${ENABLE_GRADIO_UI:-1}"
      WORKSPACE_ID: "${WORKSPACE_ID:-default}"
      WORKSPACES_ROOT: workspaces
      # Override image default: empty → workspace index under ./workspaces/<WORKSPACE_ID>/index.
      RAG_INDEX_DIR: "${RAG_INDEX_DIR:-}"
      RAG_CORPUS_ROOT: "${RAG_CORPUS_ROOT:-}"
    volumes:
      - ./workspaces:/app/workspaces
      - ./data:/app/data
      - ./sample_data:/app/sample_data:ro
    healthcheck:
      test:
        ["CMD", "curl", "--fail", "--silent", "--show-error", "--max-time", "4", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:${COMPOSE_API_PORT:-18080}
    ports:
      - "${COMPOSE_UI_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy

  n8n:
    profiles:
      - automation
    image: n8nio/n8n:1.73.1
    ports:
      - "5678:5678"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TRIAGE_API_BASE=http://api:8000
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
