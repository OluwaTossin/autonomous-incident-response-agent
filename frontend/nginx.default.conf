server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Next static export: paths are real files; fall back for clean URLs.
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    add_header X-Content-Type-Options nosniff always;
}
